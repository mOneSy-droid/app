<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <noscript>
      <div style="font-family: Inter, system-ui, -apple-system, sans-serif; padding:20px; text-align:center; background:#fff; color:#111;">
        This application requires JavaScript. Please enable JavaScript in your browser.
      </div>
    </noscript>
    <script>
      // Small runtime fallback for easier debugging when the SPA fails to mount.
      (function(){
        try{
          var root = document.getElementById('root');
          setTimeout(function(){
            var hasChild = root && root.children && root.children.length>0;
            if(!hasChild){
              var el = document.createElement('div');
              el.style.cssText = 'position:fixed;inset:12px;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.65);color:#fff;padding:20px;border-radius:12px;z-index:99999;font-family:Inter,system-ui,sans-serif;font-size:14px;';
              el.innerText = 'App failed to load. Open the browser Console (F12) and check for errors.';
              document.body.appendChild(el);
            }
          }, 1500);
        }catch(e){console.warn('fallback check failed',e)}
      })();
    </script>
  </body>
</html>
